body:
  text: 廉吏傳傳記類三總録之屬提要臣等謹案廉吏傳二卷宋費樞撰樞字伯樞成都人其仕履始末則無考也是書書録解題作十卷此本祗分上下二卷與舊目不符然斷自列國迄于隋唐凡百十有四人與陳振孫所記人數相合則卷數有所合併文字無所刪剃也大㫖以風厲廉隅為主故但能謹飭簠簋即略其他事節略一長每𫝊各系以論斷如華歆禇淵之屬皆極為揚榷褒貶或偶失謹嚴史稱蓋寬饒深刻陷害人樞既病其清太介不能容物唐狄士文史亦稱其深文陷害樞又惜其公正受禍持論亦自相矛盾然如載公孫宏並著其忌賢之謀載牛僧儒亦書其朋黨之罪綜核大致其議論去取猶可謂不諛不隱者矣乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:f24b4aa3a699b53cf031ca0ccce3a6aac64fc067df6e1d3c36af366376b735e6
