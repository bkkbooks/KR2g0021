body:
  text: 廉吏傳卷下宋費樞撰南史嘗謂清修髙潔之士何世無之然求用於時委身為吏亦必其國有道不為巳辱則彼將輩出而為用矣晉自渡江國勢日削禍亂相仍以召權臣之篡於時宋髙祖奮臂草野誅鉏姦凶再興晉室埀二十年然後因天命受晉襌觀其治兵誓衆經營四方東征而慕容超橫潰南伐而盧循殄滅西獲譙縱北縳姚泓遂使威稜震讋華夏蜚聲繼以文帝惠愛勤約幾臻承平以成一代之治故南國四朝為宋齊梁陳而吏以廉稱者惟宋最盛其餘則國體世俗鮮有足道嗚呼觀人材之衆寡亦可略見矣作南史廉吏傳王琨王琨華從父弟也琨少謹篤歷位宣城義熙太守皆以廉約稱華終又託之宋文帝故琨屢居清顯後出為廣州刺史加都督南土沃實在任者常致巨富世云廣州刺史但經城門一過便得三千萬琨無所取納表獻祿俸之半鎮舊有鼓吹又啓輸還孝武知其清問還資多少琨曰臣買宅百三十萬餘物稱之帝悅其對卒年四十八王惠王惠字令明誕從祖弟也宋國初建當置郎中令武帝難其人既而曰吾得其人矣乃以惠居之少帝以蔡廓為吏部尚書不肯拜乃以惠代焉惠被召即拜未嘗接客人有與書求官得輒聚閣上及去職印封如初時以廓不拜皆是也兄鑒頗好聚斂惠意不同謂曰何用田為鑒怒曰無田何由得食惠又曰何用食為其標寄如此論曰嘗聞清潔之吏必有所守茍有所守則不撓於權昔曹魏時毛玠以清正典選舉文帝屬所親眷玠確不納果不撓其所守也史官書王琨為吏部郎貴要多所屬請琨自公卿下至士大夫例為用兩門生江夏王義恭更有所屬琨執不許惠為吏部尚書人有與書求官者得即聚閣上及去職印封如初二王其毛玠之流歟使百官執事人人如琨惠之潔則天下何患其不理此君上所宜留意也孔顗孔顗字思逺少骨鯁有風力以是非為己任口吃好讀書早知名性真素不喜寶玩服用時吳郡顧愷之亦尚儉素衣裘器服皆擇其陋者宋世清約稱此二人覬弟道存從弟徽頗營産業二弟請假東遷顗出渚迎之輜重十餘船皆是錦絹紙席之屬覬見之偽喜曰我比乏得此甚要因命置岸側既而正色曰汝輩忝預士流何至還東作賈客耶命燒盡乃去先是庾徽之為御史中丞性豪麗服玩甚華覬代之衣冠器用莫不粗率蘭臺令史並三吳富人咸有輕之之意顗蓬首緩帶風貌清嚴皆重迹屏氣莫敢欺犯後為司徒左長史道存代覬為後軍長史江夏內史時東土大旱都邑米貴一斗將百錢道存慮顗甚乏遣吏載五百斛米餉之顗呼吏謂之曰我在彼三載去官之日不辦有路糧即至彼未幾那能便得此米耶可載米還彼吏曰自古以來無載米上水者都下米貴乞就貨之不聽吏乃載還論曰王惠清修而鑒好聚斂劉覽髙尚而孝綽贓墨南朝士論且深惜之金昆玉友並秀一門誠不可多得也宋世清約孔顗有稱而道存徽營利謀食為顗之耻至焚其輜重却其餉米夫有兄如此而不少薰其清德彼何人哉彼何人哉褚彥回褚彥回幼有清譽父湛之卒彥回悉推財與弟澄唯取書數千卷湛之有兩厨寶物在彥回所生郭氏門嫡母吳縣主求之郭欲不與彥回曰但令彥回在何患猶不許彥回流涕固請乃從之宋明帝即位纍遷吏部尚書有人求官密袖一餅金示之曰人無知者彥回曰卿自應得官無假此物若必見與不得不相啓其人懼而去彥回敘其事而不言其名時人莫知之也齊髙帝受命加彥回尚書令時淮北屬江南無鰒魚間有得之者一枚直數千錢人有餉彥回鰒魚三十枚彥回時雖貴而貧薄過甚門生有獻計賣之可得十萬錢彥回曰我謂此食物非曰財貨且不知堪賣錢耶聊爾受之雖復儉乏寧可賣餉取錢也悉與親遊噉之朝廷機事彥回多與議謀每見從納禮遇甚重薨年四十八家無餘財負責數十萬諡曰文簡論曰彥回悉推財於弟而獨取書數千卷其趣尚固自高逺矣袖金求官賣餉取錢彼何人者乃敢以是相凂耶裴昭明裴昭明少傳儒史之業宋元徽中為長沙郡丞罷任刺史王藴之謂曰卿清貧必無還資湘中人士有須一禮之命者我不愛也昭明曰下官忝為郡佐不能光益上府豈以鴻都之事仰纍清風齊永明三年為始安內史及還甚貧罄武帝曰裴昭明當罷郡還遂無宅我不讀書不知古人中誰可比之昭明歷郡皆清勤常謂人曰人生何事須聚蓄一身之外亦復何須子孫若不才我聚彼散若能自立則不如一經故終身不事産業中興二年卒論曰韋賢有言遺子黃金滿籝不如教子一經昭明其達此者歟夫志趣鄙陋之人聞此言也未必不嗑然而笑之且彼之與此莫非所以遺後人惟君子能擇其久逺之業而用之爾顧憲之顧憲之字士思性尤清直宋元徽中為建康令時號神明至於權要請託長吏貪殘據法直繩無所阿縱性又清儉強力為政故都下飲酒者醇旨輒號為顧建康謂其清且美焉後仕齊歷位給事黃門郎兼尚書吏部郎中宋時其祖愷之嘗為吏部於庭列植嘉樹謂人曰吾為憲之植耳至是憲之果為此職憲之雖纍經宰郡資無儋石及歸環堵不免飢寒卒於家論曰宋世清約唯推顧愷之孔顗二人時愷之於吏部植嘉木期憲之異日為此職後果如其言夫為善於人責報於天誠如此其驗乎斯足為清吏之勸焉阮長之阮長之字景茂間居篤學未嘗有惰容初為諸府參軍母老求補襄垣令督郵無禮鞭之去職後拜武昌太守時郡田祿以芒種為斷此前去官者則一年秩祿皆入後人始以元嘉末改此科計月分祿長之去武昌郡代人未至以芒種前一日解印綬初發都親故或以器物贈别得便緘録後歸悉以還之為中書郎直省夜往鄰省誤著屐出閣依故事自列門下以暗夜人不知不受列長之固遣送曰一生不侮暗室前後所蒞官皆有風政為後人所思宋世言政者咸稱之文帝深惜之曰景茂方堪大用豈直以清苦見惜論曰古者制圭田以養廉其名為圭者取其潔也後之仕者如賤商趨市惟恐緩期不得乘其錐刀之利至為科法以限之長之先期解印綬使祿秩屬後人豈非廉者然後能推遜耶甄彬甄彬有行業鄉黨稱善嘗以一束苧就州長沙寺庫質錢後贖苧還於苧束中得五兩金以手巾裹之彬得送還寺庫道人驚云近有人以此金質錢時有事不得舉而失檀越乃能見還輒以金半仰酬往復十餘彬堅不受因謂曰五月披羊裘而負薪豈拾遺金者耶卒還金梁武帝布衣時聞之及踐阼以西昌侯藻為益州刺史乃以彬為府録事參軍帶郫縣令將行同列五人帝誡以廉慎至彬獨曰卿昔有還金之美故不復以此言相屬由此名德益彰及在蜀藻禮之甚厚云論曰昔者鄭子真耕於巖谷之下名震於京師人之為善焉有隱而不形者乎甄彬還金於鄉寺而取知於冕旒榮哉虞願虞願字士恭會稽餘姚人也祖賚給事中監利侯賚中庭橘熟子孫競取之願年數歲獨不取家人皆異之宋元嘉中出為晉安太守在郡不事生業前政與百姓交關質録其兒婦願遣人追奪還之郡舊出蚺蛇膽可為藥有遺願蛇者願不忍殺放踰數十里外而復歸者至再時以為仁心所致海邊有越王石常隱雲霧世傳清廉太守乃得見願往就觀清徹無所隱蔽後琅邪王秀之為郡與朝士書曰此郡承虞公之後善政猶存遺風易遵差得無事禇彥回嘗詣願願不在見其眠牀上積塵埃有書數帙彥回歎曰虞君之清至於此令人掃地拂牀而去論曰褚彥回一時清流而歎服虞君之清如此願之為人可知矣范述曽范述曽字頴彥吳郡錢塘人也齊明帝用為永嘉太守政清平不尚威猛氓俗使之所部橫陽縣山谷嶮峻為逋逃所聚前後二千石討捕莫能息述曽下車開恩示信凡諸凶黨襁負而出編户屬籍者二百餘家自是商旅流通居人安業勵志清白不受饋遺明帝下詔褒美召為遊擊將軍郡送故舊錢二十餘萬一無所受唯得白桐木火籠朴十餘枚而巳述曽平生所得俸祿皆以分施及老遂壁立無資以天監八年卒後有吳興丘師施亦以廉潔稱罷臨安縣還唯有二十籠簿書並是倉庫劵帖當時以比述曽孫謙孫謙字長遜東管莒人也客居歷陽躬耕以養弟妹鄉里稱其敦睦仕宋為句容令清慎強記縣人號為神明宋明帝以為巴東建平二郡太守郡居三峽常以威力鎮之謙將述職敕募千人自隨謙曰蠻夷不賔蓋待之失節爾何煩兵役以為國費固辭不受至郡布恩惠之化蠻彞懷之競餉金寶謙慰諭而遣一無所納及掠得生口皆放還家奉秩出吏人者悉原除之郡境翕然威恩大著齊初為錢塘令御煩以簡獄無繫囚及去官百姓以謙在職不受餉遺追載縑帛以送之謙辭不受每去官輒無私宅借空車廏寓止焉謙自少及老歷二縣五郡所在廉潔居身儉素牀施籧除屏風冬則布被莞席夏日無幬帳而夜臥未嘗有蚊蚋人多異焉卒年九十二何逺何逺字義方東海剡人也梁武帝踐阼為武昌太守逺性本倜儻尚輕俠至是乃折節為吏杜絶交逰饋遺秋毫無所受武昌俗皆汲江水當盛夏每患水溫每以錢買人井水不取錢者則汲水還之其他事率多如此迹雖似偽而能委曲用意車服尤弊素器物無銅漆江左水族甚賤逺每食不過乾魚數片而已然性剛嚴吏人多以細事受鞭罰遂為人所訟徵下廷尉被劾十數條當時士大夫坐法皆不受測逺度己無贓就測立三七日不款猶以私藏禁仗除名後為武康令愈厲節廉正身率職人甚稱之太守王彬巡屬縣諸皆盛供帳以待焉至武康逺獨設糗水而巳武帝聞其能擢為宣城太守自縣為近畿近代未之有也逺在官田秩俸錢並無所取歲暮擇人尤窮者充其租調以此為常然其聽訟猶人也不能過絶而性果斷人畏而惜之所至皆生為立祠表言政狀帝每優詔答焉其清公為天下第一居數郡見可欲終不變其心妻子飢寒如下貧者始為東陽太守豪右畏憚遂坐謗免去官歸家歷年歲口不言榮辱士類益以此多之其輕財好義周人之急言不虛妄蓋天性也每戲語人云卿能得我一妄語我謝卿以一縑衆共伺之不能記也後以疾卒論曰東漢大將軍竇憲將兵出屯所至州郡悉修禮遺惟張掖太守李恂公清不阿為憲奏免何逺以廉正舉職在武康令時太守王彬巡屬縣諸皆盛供帳獨武康設糗水而已彬去更與盡歡嗚呼郡縣禮遺供帳之屬一出於公家給賜則可在上位者若踰法制責之彼守令何從得之是驅而相與裒削耳賢者肯為之哉此君子所以稱逺之清正而尤多彬之不屑責於人也郭祖深郭祖深襄陽人也梁武帝普通七年改南州津用為南津校尉加雲騎將軍秩二千石使募部曲三千及至南州公嚴清刻由來王侯勢家出入津不忌憲綱俠藏亡命祖深搜檢姦惡不避強禦動致刑辟奏江州刺史邵陵王太子詹事周捨贓罪逺近側足莫敢縱恣淮南太守畏之如上府常服故布襦素木案食不過一肉有姥餉一青瓜祖深報以匹帛後有富人效之以貨鞭而徇衆朝野憚之絶於干請論曰以匹帛與餉瓜之姥近乎傷惠然考祖深行事之始終蓋非惠而不知為政者北史拓跋氏有國久矣自道武乘燕涼之衰憑陵中夏吞併北冀數千里之地而有之國始號魏明元大武繼之土地益廣東至海岱南包荆豫西達於關中北逾于大漠其後魏析東西傳於周齊世代綿久乃能與江表抗分南北自孝文崇飾儒雅興禮作樂修帝王之政厥後風聲文物與南土相輝而北俗質實不染江左之靡麗懷材勵行之士遂亦多砥礪廉隅敦崇風節能謹守儉素之操焉作北史廉吏傳長孫道生長孫道生嵩從子也忠厚篤謹魏太武征赫連昌道生為前驅遂平其國後除司空加侍中進封上黨王道生尤廉約身為三司而永不華飾食不兼味一熊皮鄣泥數十年不易時人比之晏嬰第宅卑陋出鎮後其子弟頗更修繕起堂廡道生還歎曰昔霍去病以胸奴未滅無用家為今強冦尚遊魂漠北吾豈可安享華美也乃切責子弟令毁其宅太武世所在著績每建大議多合時機為將有權略善待士衆帝命歌工歷頌羣臣曰智如崔浩廉如道生道生薨年八十二諡曰靖與父嵩俱為三公當世以為榮論曰昔吳漢事光武嘗出征妻子營田宅漢命分與親黨無留曰軍師在外吏士不足何以家為道生為將可無愧於漢矣得以廉聲登之歌頌豈不美哉裴俠裴俠字嵩和河南解人也州辟主簿舉秀才魏正光中解巾奉朝請後事周文帝為河北郡守俠躬履素儉愛人如子所食唯菽麥鹽菜而已吏民莫不懷之此郡舊制有漁獵夫三十人供郡守役俠亦不以入私並收庸為市官馬歲時既積馬遂成羣去職之日一無所取人歌曰肥鮮不食丁庸不取裴公貞惠為世規矩俠嘗與諸牧守俱謁周文周文命俠别立謂諸牧守曰裴俠清慎奉公為天下之最令衆中有如俠者可與之俱立衆皆默然無敢應者周文乃號為獨立使君又撰九世伯祖正侯潛傳述裴氏清公欲使後生奉而行之宗室中知名者咸付一通從弟伯鳳世彥時並為丞相府佐笑曰人生仕進須身名並裕清苦若此欲何為也俠曰夫清者蒞職之本儉者持身之基况我大宗世濟其美故能存見稱於朝廷沒流芳於典䇿今吾幸以凡庸濫蒙殊遇固其窮困非慕名也志在自修懼辱先也翻被嗤笑知復何言伯鳳等慚而退周孝閔帝踐阼遷户部中大夫時有姦吏主持倉儲積年隱沒至千萬者及俠在官勵精發擲數旬之間姦盜略盡轉工部中大夫有大司空掌錢物典李貴乃於府中悲泣或問其故對曰所掌官物多有費用裴公清嚴懼遭罪責所以泣耳俠聞之許其自首貴自言隱費錢伍百萬俠嘗遇疾沈頓士友憂之忽聞五鼓便即驚起顧左右曰可向府耶疾因以瘳晉公護聞之曰裴俠危篤若此而不廢憂公因聞鼓聲一朝疾愈此天祐其勤恪也又司空許國公宇文貴小司空北海公申徴並來候俠疾所居第屋不免霜露貴等還言之於帝帝矜其貧苦乃為起宅并賜良田十頃奴𨽻耕耒莫不備足搢紳咸以為榮卒於位贈太子少師蒲州刺史諡曰正河北郡前功曹張回及吏人等感俠遺愛乃作頌紀其清德焉論曰俠在郡而民歌之入國而君賞之發擲姦伏而吏畏之忘身向公而天祐之豈他術哉俠嘗曰清者蒞政之本儉者持身之基蓋其所以終身行之者此言也袁聿修袁聿修字叔德齊天統中詔與趙郡王睿等議定五禮出為本鄉信州刺史為政清靖不言而化自長史以下爰逮鰥寡孤幼皆得其歡心武平初御史普出過諸州悉有舉劾唯不到信州魏齊世臺郎多不免交通餉饋聿修為尚書郎十年未嘗受升酒之遺尚書邢邵與聿修舊款每省中語戲常呼聿修為清郎大寧初聿修以太常少卿出使巡省仍令考校官人得失經兖州時邢邵為刺史别後送白紬為信聿修不受與邵書云今日仰過有異常行瓜田李下古人所慎願得此心不貽厚責邵亦欣然領解報書云老夫忽忽意不及此欽承來旨吾無間然弟昔為清郎今日復作清卿矣後入周仕隋為熊州刺史卒庫狄士文庫狄士文字士文生平立志孤直雖鄉里至親莫與通狎在齊襲父爵封章武郡王周武帝平齊山東衣冠多來迎唯士文閉門自守帝竒之授開府儀同三司隨州刺史隋文受襌加上開府尋拜貝州刺史性清苦不受公料家無餘財其子嘗啖官厨餅士文枷之於獄纍日杖之二百步送還京僮𨽻無敢出門所買鹽菜必於外境凡有出入皆封緘其門親故絶迹慶弔不通法吏嚴肅吏人股戰道不拾遺有細過必深文陷害嘗入朝遇上賜公卿入左藏任取多少人皆極重士文獨口銜絹一匹兩手各持一匹上問其故士文曰臣口手俱足餘無所須上異之别賞遺之士文至州發擲姦細諂諛長吏尺布斗粟之贓無所寬貸得千人奏之悉配防嶺南親戚相送哭聲遍於州境至則死者十八九其後唐君明為御史劾士文性剛在獄數日憤恚而死家無餘財有三子朝夕不繼親賔無贍之者論曰士文以子啖官厨餅獄之近乎賊恩矣其發摘姦贓雖尺布斗粟無所容貸流放者至千人亦過矣蓋魏齊世居官者不免以餉遺交通想士文有所激而為此耶及其憤死家無餘財親賔無有贍其子者後世庸人必謂士文獲報如此嗚呼孔氏以儒窮後之君子不廢為儒顔氏善而夭後之君子不廢為善且以孟獻子之為父子服他之為子方季文子為魯上卿妾不衣帛馬不食粟子服譏之其後文子以告獻子囚之七日卒能改過為魯上大夫是則士文之獄其子亦獻子之愛其子也至夫千人者豈盡士文之讎怨哉非讎非怨而獲罪者公也士文之心則正矣天道豈禍正耶特當時親賔無賢者爾郎基郎基字世業中山新市人也齊天保四年除海西鎮將御史中丞畢義雲引為侍御史趙州刺史尉粲文宣外弟揚州刺史郭元真楊愔妹夫基不憚權威並劾其贓罪皇建初除鄭州長史基性清慎無所營求嘗語人云任官之所木枕亦不須作况重於此乎唯頗令人寫書潘子義遺之書云在官寫書亦是風流罪過基答云觀過知仁斯亦可矣卒諡曰惠論曰後漢吳恢守南海欲殺青簡寫經書其子祐諫止之祐非謂害廉特畏竹簡有薏苡之嫌爾後世用紙則異於竹簡矣此基之所以不嫌也然以木枕之微基猶以為不須作其他可知也巳隋晉失其鹿南北分裂至隋開皇中區宇混一人心之望治者如渴得飲故豪傑有志之士坌然歸之而清廉者亦簉其間惜其功淺德薄規模不宏逺而士之可書者不過數人矣作隋廉吏傳骨儀骨儀天竺國人也性剛鯁有不可奪之志開皇初為侍御史處法平當不為勢利所回煬帝嗣位遷尚書左司郎於時朝政漸亂濁貨公行凡當樞要之職無問貴賤並家纍金寶天下士大夫莫不變節而儀勵志守常介然獨立帝嘉其清苦超拜京兆郡丞論曰管子有言禮義廉恥國之四維四維不張國乃滅亡蓋禮義廉恥之行在人而主之者在國家若朝政失其紀則士夫亦變其節矣嗚呼隋至煬帝之時濁貨公行樞要之家攫金無憚是隋之政紀已無矣不滅亡何待哉骨儀是時為獨清之人帝雖嘉之然一木之支安能效其力於顛厦耶韋師韋師字公頴京兆杜陵人也齊王憲為雍州牧引師為主簿平陳之役領元帥掾陳國府藏悉委於師秋毫無所犯稱為清白後上為長寧王儼納其女為妃除汴州刺史甚有治名卒於官論曰軍旅之會廉士難其人矣髙祖平陳韋師以掾主府藏秋毫無欺且是時非有簿正防檢而彼有所不為兹可以見其所守矣侯莫陳頴侯莫陳頴字遵道代人也髙祖受禪遷瀛州刺史甚有惠政在職數年坐纍免官百姓將送者莫不流涕因相與立碑頌頴清德俄拜邢州刺史仁夀中吏部尚書牛𢎞持節巡撫山東以頴治為第一髙祖嘉歎優詔褒揚時朝廷以嶺南刺史縣令多貪鄙蠻夷怨叛妙簡清吏以鎮撫之於是徴頴入朝及進見上與頴言及平生以為歡笑數日進位大將軍拜桂州總管煬帝時復拜南海太守卒論曰治亂之幾甚於反掌清吏基治汙吏階亂勢之必然也昔在東漢以在位侵削而交址怨叛用賈琮為刺史而部中清明隋以嶺南守令多貪鄙而蠻夷怨叛用頴為桂州總管而遂以鎮伏嗚呼清汙之吏利害邈然惟朝廷清明紀律振舉誅賞有章逺方承法則怨叛何患哉梁毗梁毗字景和安定烏氏人也髙祖受襌出為西寧州刺史改封邯鄲縣侯在州十一年先是蠻夷酋長皆服金冠以金多者為豪雋由此遞相陵奪每尋干戈邉境略無寧歲毗患之後因諸酋長相率以金遺毗於是置金坐側對之慟哭而謂之曰此物飢不可食寒不可衣汝等以此相滅不可勝數今將此來欲殺我耶一無所納悉以還之於是蠻夷感悟遂不相攻擊髙祖聞而善之徴為散騎常侍煬帝即位遷尚書攝御史大夫事奏劾宇文述私役部兵帝議免述罪毗固諍因忤旨遂令張衡代之毗憂憤數月而卒論曰邊方最貪動相吞噬毗之在郡躬履清節諭以至言而彼皆感悟其化深矣然宇文述私役部兵毗劾其罪坐是忤旨憂憤隕身嗚呼嘗聞人亂治之以兵兵亂治之以法法亂則無可以治矣觀隋之賞罰如此欲不滅亡難哉裴矩裴矩字𢎞大河南聞喜人也煬帝即位進位右光祿大夫於時皇綱不正人皆變節左翊衛大將軍宇文述內史侍郎虞世基等用事文武多以賄聞矩守常無贓穢之響以是為世所稱史官曰裴矩學涉經史頗有幹局至於恪勤匪懈夙夜在公求諸古人殆未之有與聞政事多歷歲年雖處危亂之中未虧廉謹之節美矣然承望風旨與時消息使髙昌入朝伊吾獻地聚糧且未師出玉門關右騷然頗亦矩之由也論曰矩遵素守介乎宇文述虞世基羣汙之中取一時之清譽為得之矣然君子所貴乎廉者為其視外物輕不以利自纍則出處裕然其出則如東漢楊震李固輩奮不顧身有力國計其退則如管寧在魏陶潛在宋身退名全清議亦歸一出一處大抵不踰此兩塗為善也矩既有清節乃承望風旨與時消息後仕於唐而史官以謂其姦足以亡隋其智足以佐唐是則前日之清修亦何所施乎哉此非廉之罪以其道不足故也樊子蓋樊子蓋字華宗廬江人也煬帝即位授武威太守以善政聞大業三年入朝帝引之內殿特蒙褒美乃下詔曰子蓋幹局通敏操履清潔自剖符西服愛惠為先撫導有方寬猛得所處脂膏不潤其質酌貪泉豈渝其性故能治績克彰課最居首凡在厥位莫非王臣若能人思奉職各展其效朕將冕旒埀拱何憂不治哉於是進位金紫大夫太守如故五年車駕西巡將入吐谷渾子蓋以彼多瘴氣獻青木香以禦霧露及帝還謂之曰人道公清定如此否子蓋謝曰臣安敢言清止是小心不敢納賄耳由此賜之口味百餘斛乃下詔褒美進右光祿大夫太守如故子蓋無他權略在軍持重未嘗負敗蒞官明察下莫敢欺然嚴酷少恩果於殺戮臨終之日見斷頭鬼前後重沓為之厲云唐歷觀前代類有真賢碩士可紀於時然未有如唐之得人為最多何也蓋唐選舉之法科目不一如秀才明經俊士進士之類則有司常選歲有定舉與志烈秋霜賢良方正達於教化詳明政術之類則天子自詔號為制舉其吏部銓選也則嚴保識之官而刑家之子工賈異類悉不得雜亂士流又擇人之條取以四事而身言書判咸以德行為先下至蔭補齋郎猶以清官子為之其法巳自善矣况三百年之間其時君賢否好惡不同而樂善求賢之意未始少怠其開基創業得太宗英明之主行仁義以致太平故後世賴之易以持守焉嘗謂吏部尚書杜如晦曰今専以言辭刀筆取人而不悉其行至後敗職雖刑戮之而民已敝矣夫朝廷之上既有旁搜廣取之法而又有至誠責實之意則凡中此選者何啻拔十得五有茍賤不廉之徒固難自肆於時則清潔之士惡得不泰然獲伸其志哉故唐之科目得人為盛其不由科目進者亦一時忠義豪傑之士也作唐廉吏傳屈突通屈突通先仕隋蒞官徑正有犯法者雖親無所回縱煬帝南幸留鎮長安髙祖起被擒帝勞曰何相見晚耶泣曰通不能盡人臣之節故至此為本朝羞帝曰忠臣也釋之授兵部尚書為秦王行軍元帥長史從平薛仁杲時賊珍用山積諸將爭得之通獨無所取帝聞曰清以奉國名定不虛特賚金銀六百兩綵千假卒年七十二贈尚書左僕射諡曰忠後詔配饗太宗廟廷初桂州都督李𢎞節亦以清慎顯既殁其家賣珠太宗疑𢎞節實貪欲追坐舉者魏徴曰陛下過矣且今號清白死不變者屈突通張道源通三子來調共一馬道源子不能自存審其清者不加恤疑其濁者罪所舉帝曰朕未之思置不問通之清益顯云論曰士大夫尚節義要其始終不渝在於檢束其家人無自取坫而後可李𢎞節以清慎顯既殁之後其家賣珠太宗疑其實貪劉崇龜姻舊不可干以財既殁之後其家有鬻珠翠者由是名損此齊家之道不可不慎也屈突通三子赴調共一馬其清節益著視漢楊氏可無愧矣皇甫無逸皇甫無逸字仁儉京兆萬年人本隋勳舊髙祖尊遇之蜀新定吏多橫恣人不聊生詔無逸持節巡撫得承制除吏既至黜貪暴用廉善法令嚴明蜀人以安後徙益州大都督府長史所至輒閉門不通賔客左右無敢出入者所須皆市易他境嘗按部宿民家鐙炷盡主人將續進無逸抽佩刀斷帶為炷其廉介類如此然過自畏慎每上表疏讀數十猶懼未審使者上道追省再三乃得遣母是時在長安疾篤太宗命馳驛召還承問憂悸不能食道病卒李襲譽李襲譽字茂實髙祖已定長安召授官擢纍揚州大都督府長史江南巡察大使多所黜陟召為太府卿為人嚴慤以威肅聞居家儉厚於宗親祿廩隨多少散之以餘資寫書罷揚州書遂數車載嘗謂子孫曰吾性不喜財遂至窶乏然負京有賜田十頃能耕之足以食河內千樹桑事之可以衣江都書力讀可進求官吾殁後能勤此無資於人矣論曰襲譽之遺子孫也負京田河內桑足以資其衣食既有常産又有揚州數車書令不失素業可謂得逺圖而近中道矣蕭倣蕭倣字思道太和中擢進士第自集賢學士拜嶺南節度使南方珍賄叢夥不以入門家人病取稿梅于厨以和藥倣知趣市還之卒年八十子廩字富侯第進士倣領南海解官往侍為人退約少合南海多穀紙倣敕諸子繕補殘書廩諫曰州距京師且萬里書成不可露齎必貯以囊笥貪者伺望得無薏苡嫌乎倣乃止論曰東漢吳祐諌其父不寫書北齊郎基在官頗寫書然皆以廉得名然則繕補殘書亦無損於大節也倣子廩且引嫌諫止豈不以南海珍竒所聚之地不可不慎耶張玄素張玄素蒲州虞鄉人仕隋為景城縣戶曹竇建德陷景城執將殺之邑人千餘號泣請代曰此清吏殺之是無天也建德命釋縛太宗即位問以政玄素亦數有諫諍魏徴名梗挺聞玄素言每嘆曰張公論事有回天之力可謂仁人之言哉論曰玄素初為縣小吏方被俘執邑人皆號泣以為清吏願代之死嗚呼清吏之得民心也如此長孫順德長孫順德無忌族叔也初仕隋亡命歸太宗有佐命之功為左驍衛大將軍以受賕為有司劾發帝曰順德元勳外戚爵隆位厚至矣若令觀古今自鑒有以益國家者朕當與共府庫何乃以貪冒聞乎因賜帛數十愧切之大理少卿胡演曰順德以賂破法不可赦奈何又賜之帝曰使有恥者得賜甚於戮如不改乃禽獸也殺之何益後為澤州刺史折節為政以嚴明稱先時守長多通餉問順德繩摘無所容後為良吏論曰君子小人豈天與之名而一定不可易哉禮義本無私也違之則為小人蹈之則為君子是故聖人貴遷善改過推恕以待天下不使之一跌而遂為小人終不可為也順德貪冒更賜之帛以愧切其心後果易志遂為良吏昔許圉師為相州刺史有受賕者圉師不忍按但賜清白針其人自愧亦修飾更為廉士嗚呼去小人而為君子果可以勉而至之捨穢趨潔夫人何憚耶且太宗嘗疾貪吏欲懲艾之乃間遣人饋遺諸曹一吏受縑怒欲殺之裴矩謂不可紿人以行法帝乃止至順德受賕既為有司劾發帝以勳戚不正其罪何耶愚竊謂人之有過當其未露則可責其改既已發矣則有法存焉受饋縑者尚欲罔之以罪而在有司者乃更賜之以帛何太宗之英烈而有所蔽如此夫法為至公天下共之也非一人所能私也順德勳戚法在所議豈可置而不問耶雖然順德之折節厲志不負曲恩終稱循良亦可書也蔣渙蔣焕父挺歷胡延二州刺史涣永泰初歷鴻臚卿日本使嘗遺金帛不納維取箋一畨貽書以報其副挺卒涣與其兄洌廬墓側植松柏千餘洌子鍊涣子銖又有清白名阿史那社爾阿史那社爾突厥處羅可汗之次子處羅卒哀毁如禮治衆十年無課斂或勸厚賦以自奉答曰部落豐餘於我足矣故首領咸愛之貞觀十年入朝授左驍衛大將軍處其部於靈州詔尚衡陽公主為駙馬都尉典衛屯兵十四年以交河道行軍總管平髙昌諸將咸受賞社爾以未奉詔秋毫不敢取見别詔然後受又所取皆老弱陳弊太宗美其廉嘗與郭孝恪等五將軍討龜兹恪之在軍牀帷器用多飾金玉以遺社爾不受帝聞曰二將優劣不復問人矣論曰社爾本畨將入朝著忠義之節方在戎狄中不厚賦以自奉且謂部落豐餘於我足矣及其仕唐不替初終之操以功為天子倚信列名青史亦可嘉哉王義方王義方泗洲漣水人舉明經詣京師客有徒步疲于道者自言父官逺方病且革欲往省困不能前義方哀之解所乘馬以遺不告姓名去由是譽振一時不肯造請貴勢太宗使宰相聽其論於是魏徵異之欲妻以夫人之姪辭不敢俄而徴薨乃娶人問其然曰初不附宰相今感知己故也義方嘗為御史時買第後數日愛庭中樹復召主人曰此佳樹得無欠償乎又豫之錢其廉不貪類此始魏徴愛其材也每恨太直後卒以嫉惡不容於時既死門人員半千何彥先行喪蒔松柏墓側三年乃去論曰南史顔延之嘗買田不還直後為御史所劾大抵茍利昧得之徒不有銜策以制之無畏也義方買第之後因愛庭木復召主人償之錢其不貪如此觀其微時巳能解所乘馬以周人之急蓋輕財重義久矣又焉貪韓思彥韓思彥字英逺鄧州南陽人萬年令李乾祐異其才舉下筆成章志烈秋霜科擢第監察御史嘗使并州司農武惟良擅用并州賦二百萬緡思彥劾處死武后為請而免後思彥遂以譖出為山陽丞初尉遲敬德子姓陷大逆思彥按釋其寃至是贈黃金良馬思彥不受至官閲月自免去後復召歷官徙蘇州録事參軍罷客汴州張僧徹者廬墓三十年詔表其閭請思彥為頌餉縑二百匹不受時歲凶家窶甚僧徹固請為受一匹命其家曰此孝子縑不可輕用上元中復召見思彥久去朝儀矩梗野拜忘蹈舞又詆外戚擅權后惡之被劾云負氣不可用遷賀州司馬卒論曰嘗見韓思彥舉志烈秋霜科牛僧孺舉賢良方正科二人皆以廉節有名於唐然思彥嘗劾武惟良之贓力詆武氏族擅權終以散官廢死誠所謂志烈秋霜矣而僧孺交結李宗閔相為朋黨起縉紳之禍四十餘年其可謂賢良方正也哉嗚呼惟君子而後有終焉陸景倩陸景倩元方子也為扶溝丞河南按察使覆州縣殿最欲必得實有吏言狀曰某疆清某詐清惟景倩曰真清也韓思復韓思復京兆長安人也祖倫貞觀中歷左衛率封長山縣男思復少孤篤學舉秀才高第襲祖封永淳中家益窶歲歉京兆杜瑾者以百綾餉思復思復方併日食而綾完封不發調汴州司户仁恕不行鞭罰以親喪去官鬻薪自給後歷仕至太子賔客卒年七十四諡曰文天子親題其碑曰有唐忠孝韓長山之墓云崔玄暐崔玄暐博陵安平人舉明經居父喪盡禮廬有燕更巢共乳母盧有賢操嘗戒玄暐曰吾聞姨兄辛玄馭云子姓仕宦有言其貧窶不自存此善也若資貨盈衍惡也吾嘗以為確論比見親表仕者務多財以奉親而親不究所從來必出於廩祿則善如其不然何異盜乎若今為吏不能忠清無以戴天履地宜識吾意故玄暐所守以清白名母亡哀毁甘露降庭樹長安六年為天官侍郎當官介然不受私謁執政忌之改文昌左丞不踰月武后曰卿向改職乃聞令吏設齋相慶此欲肆其貪耳卿為朕還舊官乃復拜以誅嬖臣封博陵郡王會貶流古州道病卒年六十九玄暐三世不異居家人怡怡如也貧寓郊墅羣從皆自逺食會無他㸑與弟升尤友愛族人貧孤者撫養教勵後雖秉權而子弟仕進不使踰常資當時稱重論曰春秋之時晉侯賞從亡者介之推不言祿祿亦弗及逮將隱也其母曰能如是乎與汝偕隱嗚呼母而不達於此介子未必獲全其髙節也君子於是賢之玄暐之母知義方愛子之教且曰若今為吏不忠清無以戴天履地宜識吾意厥後玄暐能立功名於一時無違教也盧母之語其同於不朽矣盧奐盧奐懷慎之子早修整為吏有清白稱歷御史中丞兵部侍郎天寶初為南海太守南海兼水陸都會物産瓌怪前守劉巨鱗彭果皆以贓敗故以奐代之汙吏斂手中人之市舶者亦不敢干其法逺俗為安時謂自開元後四十年治廣有清節者宋璟李朝隱奐三人而已論曰廣州貨珍之會汙吏至是類快其欲地有名貪泉者其來舊矣斯可觀風也奐之清節遂與當代宋璟李朝隱齊名晉有吳隱之宋有王琨不獨擅南方之清議矣杜暹杜暹濮州人擢明經第補婺州參軍秩滿歸吏以紙萬畨贐之暹為受百畨衆歎曰昔清吏受一大錢何異哉為鄭尉復以清節顯華州司馬楊孚公挺人也每咨重暹會孚遷大理正暹適以纍當坐孚曰使若人得罪衆安勸乎以狀言執政由是擢為大理評事開元四年以監察御史覆屯磧西會安西副都護郭虔瓘與西突厥可汗刺史邦獻鎮守使劉遐慶更相訟詔暹即按入突騎施帳究索左驗虜以金遺暹暹固辭左右曰公使絶域不可失戎心乃受焉隂埋幕下巳出境乃移文畀取之突厥大驚度磧追不及去遷給事中以母喪解會安安西都護張孝嵩遷太原尹或言暹往使安西虜伏其清今猶慕思乃奪服拜黃門侍郎兼安西副大都護進禮部尚書封魏縣侯卒諡曰貞孝暹友愛撫異母弟昱甚厚其為人少學術故當朝議論時時失淺薄然能以公清勤約自將亹亹為之自弱冠誓不通親友獻遺以終身既卒尚書省及故吏致賻其子孝友一不受以行暹素志云王丘王丘字仲山十一擢童子科他童皆專經而丘獨屬文由是知名及冠舉制科中第開元初為考功貟外郎考功異時多請託進者濫冒歲數百人丘務核實材登科才滿百議者謂自武后至是數十年來采録精明無與丘比其後席豫嚴挺之亦有稱然出丘下久之為黃門侍郎會山東旱飢議以中朝臣為刺史重其選以革頽弊乃以丘與中書侍郎崔沔等並為山東刺史而丘守懷州尤清嚴為下畏慕入知吏部選徙禮部尚書致仕丘更履華劇而所守清約未嘗通饋遺室宅童騎敝陋既老藥餌不能自給帝歎之以謂有古人節下制給全祿以旌潔吏天寶二年卒論曰開元之政最為責實故治臻隆平如丘之廉貧既休致矣猶下制給全祿以旌潔吏斯可為治世之典也歟裴寬裴寬綘州聞喜著姓性通敏工騎射彈碁投壺略通書記景雲中為潤州參軍事刺史韋詵有女擇所宜歸會休日登樓見人於後圃有所瘞藏者訪諸吏曰參軍裴寬居也與偕來詵問狀答曰寬義不以苞苴汙家適有人以鹿為餉致而去不敢自欺故瘞之詵嗟異乃引為按察判官許妻以女歸語妻曰常求佳壻今得矣明日幃其族使觀之寬時衣碧瘠而長既入族人皆笑呼為碧鸛雀詵曰愛其女必以為賢公侯妻也何可以貌求人卒妻寬為刑部員外郎萬騎將軍馬崇白日殺人而王毛仲方以貴幸將鬻其獄寬固執不肯為蒲州刺史州久旱寬入境輒雨徙河南尹不屈附權貴河南大治寬兄弟八人皆擢明經任臺省州刺史雅性友愛於東都治第八院相對甥姪亦有名稱常擊鼓會飯其為政務清簡所蒞人愛之世皆冀其得宰相天寶間稱舊德以寬為首卒年七十五李尚隱李尚隱其先出趙郡舉明經神龍中擢左臺監察御史於是崔湜鄭愔典吏部選附勢幸銓擬不平至逆用三年員缺材廉者不得進俄而相踵知政事尚隱與御史李懷讓顯劾其罪湜等皆斥去後為桂州都督稍遷廣州都督五府經略使及還人或袖金以贈尚隱曰吾自性分不可易非畏人知也尚隱凡三入御史府輒繩惡吏不以殘鷙失名所發當也物議歸重仕宦未嘗以過謫惟劾詆幸臣及坐小法左遷復見用以循吏終始年七十五諡曰正李勉李勉字玄卿鄭惠王元懿曾孫少喜學調開封尉治有名從肅宗於靈武擢監察御史後拜嶺南節度使居官久未嘗飾器用車服後召歸至石門盡搜家人所蓄犀珍投江中時人謂可繼宋璟盧奐李朝隱部人叩闕請立碑頌德代宗許之進工部尚書封汧國公滑亳節度使德宗立加同中書門下平章事卒年七十二諡正簡勉少貧俠客梁宋與諸生共逆旅諸生􅍚且死出白金曰左右無知者幸君以此為我葬餘則君自取之勉許諾既葬密置餘金棺下後其家謁勉共啓墓出金付之及歷將相所得奉賜悉遺親黨身沒無贏藏其在朝廷鯁亮廉介為宗臣表禮賢下士有終始嘗引李巡張參在幕府後二人卒至宴飲仍設虛位沃饋之論曰廉貧之節得之寒士易求之王族難何則非素習也歷觀前代惟漢唐宗室之賢為最多其處富貴利達而清約類寒士者李勉一人而已觀其在靈武時劾大將背闕之慢肅宗乃知朝廷尊嗚呼宗子維城勉之賢於城逺矣薛珏薛珏字溫如河中寶鼎人以蔭為懿德太子廟令纍遷陵臺令嵗餘以清白聞課第一改昭應令人請立石紀德珏固遜避遷楚州刺史初州有營田宰相遙領使而刺史得專達俸及他給百餘萬田歷數百年以優得遷别户三千備刺史厮役珏至悉條去之租入贏異時觀察使惡其潔誣以罪左授峽州刺史建中初德宗命使者分諸道察官吏升黜焉而李承狀珏之簡趙贊言其廉盧翰言其肅書參聞於是拜中散大夫賜金紫歷河南京兆尹卒七十四論曰先王之時碩德美行人皆有之而讒沮之風不作於世何哉賊賢害能必殺無赦故也薛珏之潔乃為上位所惡誣之以罪是無法也未幾諸使參舉乃復進用觀風之任其賢不肖於此分矣郗士美郗士美字和夫兖州金鄉人士美年十二通五經史記漢書皆能成誦父友蕭頴士顔真卿柳芳相與論繹嘗曰吾曹異日當交二郗之間後為河南尹檢校工部尚書充昭義節度使昭義自李抱真以來皆武臣私厨月費米六千石羊千首酒數十斛潞人困甚士美至悉去之出廩錢市物自給又盧從史時日具三百人膳以餉牙兵士美曰卒衛於牙固職也安得廣費為私恩亦罷之後檢校刑部尚書為忠武節度劉晏劉晏字士安曹州南華人明皇封泰山晏始八歲獻頌行在授太子正字時號神童後數領諸道度支鹽鐵轉運鑄錢租庸常平等使凡佐軍興實國用斂不及民而用度足所居修行里粗朴庳陋飲食儉狹室無媵婢德宗立言者屢請罷轉運使晏亦固辭不許始楊炎為吏部侍郎晏為尚書盛氣不相下晏嘗治元載罪而炎坐貶及炎執政銜宿怨先以誣罪貶晏忠州刺史以晏所素憾庾準為荆南節度準即奏晏與朱泚書語言怨望又搜卒擅取官物脅詔使謀作亂炎證成之建中元年詔中人賜晏死年六十五天下以為寃時炎兼刪定使議籍沒衆論不可乃止然巳命簿録其家唯雜書兩乘米麥數斛人服其廉論曰史官謂劉晏因平準法制萬物低昻常操贏資以佐軍興唐中僨而振晏有力焉而居室湫隘飲食儉約死之後其家唯雜書兩乘米麥數斛其廉亦至矣然晏嘗饋謝四方名士凡有舌者悉以利啖之使無得以訾短是晏能廉於臨財而不能廉於取名乃區區持利以結人期固寵保名嗚呼惜哉宋申錫宋申錫字慶臣史失其何所人擢進士第文宗時轉中書舍人為翰林學士帝惡宦官權寵震主而王守澄典禁兵偃蹇放肆帝察申錫忠厚因召對俾與朝臣謀去守澄等且倚以執政未幾拜尚書右丞進同中書門下平章事京兆尹王燔與謀而漏泄守澄黨鄭注得其謀遣軍候豆盧著誣告申錫與漳王等謀反典吏脅成其罪初議抵死朝臣力請出著與申錫劾正情狀帝稍悟乃貶申錫開州司馬從而流死者數百人天下以為寃初申錫以清節進嫉要位者納賕餉敗風俗故自為近臣凡四方賄謝一不受既被罪有司驗劾悉得所還問遺書朝野為之咨憫太和五年為宦官所陷七年感憤卒有詔歸葬後因李石延英召對從容為帝言原雪之仍追復舊官祿其子賜諡曰貞論曰治亂安危之所寄誠在於貪廉之人一用一捨之間耳宦官王守澄之姦亂文宗和委宋申錫懲刈之既又倚鄭注以圖成功且申錫激節守正却謝賄遺帝嘗察其忠厚可任固為得人矣而注本挾藝術附守澄以進藉權依寵專鬻官射利貪沓無厭然則若注等輩果可倚以心腹耶抑嘗考之唐祚傾覆非一朝一夕之故其所由來者漸矣閹寺專權倒持國柄自天寶以來訖於太和之際既百數十年矣在明皇時則髙力士引用安史等以召危亂在肅宗時則李輔國慿藉功勞以擅國政在代宗時則因程元振之用賞罰任情致吐蕃犯闕而方鎮之兵不至德宗時則因用竇文場霍仙鳴等分統禁旅致專制閫外而王師屢戰無功甚者至於門生天子黜陟朝臣綱紀總於百司豫決擅干制敕盤根固柢歷十數世終以覆唐社稷而後已是則文宗之世欲鉏而去之其為力固不易而乃使鄭注小人參預其間其敗乃公事必矣可不戒哉陸贄陸贄字敬輿蘇州嘉興人年十八第進士中博學宏辭壽州刺史張鎰有重名贄往見語三日可之請為忘年交既行餉錢百萬曰請為母夫人一日費贄不納止受茶一串曰敢不承公之賜史官曰德宗之不亡顧不幸哉在危難時聽贄言及巳平追仇盡言怫然以讒幸逐猶棄梗至延齡輩則寵任磐桓不移如山昏佞之相濟也世言贄白罷翰林以為與吳通玄兄弟爭寵竇參之死贄漏其言非也夫君子小人不兩進邪諂得君則正士危何可訾耶觀贄論諌數十百篇譏陳時病皆本仁義可為後世法炳如丹書帝所用才十一唐之祚不競惜哉論曰陸宣公一代之儒臣當時陳論與其行事之迹後世所共知也今録其不受餉一節并取史官之贊附之庶見其梗概焉崔戎崔戎字可大玄暐從孫也舉明經憲宗稱戎才纍擢諫議大夫雲南蠻亂成都詔戎持節劍南為宣撫使奏罷稅外薑芋錢當賦者率三之其一以準繒布優其估以與民綏招流亡凡廢若置公私莫不便之還拜給事中出為華州刺史吏以故事置錢萬緡為刺史私用戎不取及去召吏曰籍所置錢享軍吾重矯激以夸後人也徙兖海沂密觀察使擁留於道不得行乃休傳舍民至抱持取其鞾時詔使尚在民泣詣使請白天子丏戎還使許諾戎恚責其下衆曰留公而天子怒不過斬吾二三老人則公不去矣戎夜單騎亡去民追不及乃止至兖州鉏滅姦吏十餘輩民大喜歲餘卒馮伉馮伉魏州元城人徙貫京兆第五經宏詞三遷膳部貝外郎李抱真卒持節臨弔歸之帛不受又致京師伉上表固拒於是醴泉令缺宰相慎選德宗曰前使澤潞不受幣者其人清可用也遂以授伉縣多嚚猾數犯法伉為著諭蒙書十四篇大抵勸之務農進學而教以忠孝鄉黨授之使轉相教督官至散騎常侍領國子祭酒韋夏卿韋夏卿字雲客京兆萬年人少邃於學與弟正卿同舉賢良方正皆策髙第為吏部侍郎時從弟執誼在翰林嘗受人金有所干請內夏卿懷中夏卿毁懷不受曰吾與爾賴先人遺德致位及此顧當是哉執誼大慙官至太子少保歸崇敬歸崇敬字正禮蘇州吳人治禮家多識容典天寶中舉博通墳典科對策第一遷四門博士有詔舉才可宰百里者復䇿髙等為主客員外郎代宗幸陜召問得失崇敬極陳生人疲敝當以儉化天下則國富而兵可用大厯初授倉部郎中充弔祭册立新羅使海道風濤舟幾壞衆驚謀以單舸載而免答曰今共舟數十百人我何忍獨濟哉少遲風息先是使外國多齎金帛貨舉所無崇敬囊槖惟食衣東夷傳其清德後年老以兵部尚書致仕卒年八十八諡曰宣韋貫之韋貫之名純避憲宗諱以字行及進士第為校書郎擢賢良方正異等河中鄭元澤潞郗士美以厚幣召皆不應居貧啖豆糜自給再遷長安丞或薦之京兆尹李實實舉笏示所記曰此其姓名也與我同里素聞其賢願識之而進之於上或喜以告曰子今日詣實而明日賀者至矣貫之唯唯不往官亦不遷歷位尚書右丞同中書門下平章事皇甫鎛張宿皆以幸進宿出使裴度欲為請銀緋貫之曰宿姦佞吾等縱不能斥奈何欲假以寵乎由是宿等怨陰搆之自是左遷而貫之所厚善者韋顗李正辭韋處厚輩皆清正以鈎黨去穆宗立即拜河南尹以工部尚書召未行卒六十二贈尚書右僕射諡曰文貫之居輔相嚴身律下以正議裁物室居無所改易裴均子持萬縑請撰先銘答曰吾寧餓死豈能為是哉生平未嘗通饋遺家無羡財論曰皇甫湜為裴度撰寺碑曰今碑三千字字三縑何遇我薄耶柳公權以書名當時大臣家碑志非其筆人以子孫為不孝貺遺既巨萬而主藏奴或盜用姑笑而不詰然裴晉公止目湜之語為不羈穆宗尤喜公權能以筆諫是二子未可指為黷貨者且人於嚴親持縑以請銘無傷取豫之義貫之辭餽如此之峻是亦君子之過乎廉者觀其處己不肯自售於人立朝尤慎名器非稟性清介孰能為之范希朝范希朝字致君河中虞鄉人初從邠寧軍為别將德宗在奉天以戰守功纍遷振武節度使部有黨項室韋雜居暴掠放肆日入匿作謂之刮城門希朝度要害置屯保斥邏嚴密鄙民以安至小竊取殺亦無赦虜人憚伏相謂曰是必張光晟紿姓名來也邉州每長帥至必效槖駝駿馬雖甚廉者猶受之以結其歡希朝一不納積十四年虜保塞不敢橫希朝號當世善將或比之趙充國後以太子太保致仕錢徽錢徽字蔚章中進士第纍官為翰林學士三遷中書舍人憲宗嘗稱其長者後以忤宰相段文昌誣以事貶江州刺史郡例有牛田錢百萬刺史以給宴飲贈餉者徽曰此農耕之備可他用哉命代貧民租入文宗立召拜尚書左丞後以吏部尚書致仕卒年七十五徽曾任太子右庶子時韓公武以賂結公卿遺徽錢二十萬不納或言非當路可無讓徽曰取之在義不在官時稱有公望論曰可以取可以無取奚必為有位者言之耶或告徽非當路可受無嫌乃曰取之在義不在官兹言可以附聖人之經也觀其中書舍人時憲宗方禁無名貢獻而至者不甚却徽能懇諫罷之在江州以牛田錢代貧民租入不徇故事自給宴飲之奉原其用心如此豈但修身以明汙者哉李景讓李景讓字後己贈太尉憕後也性方毅有守寶厯初遷右拾遺淮南節度使王播以錢十萬市朝廷權求領鹽鐵景讓詣延英亟論不可遂知名歷中書舍人禮部侍郎商華虢三州刺史母鄭治家嚴身訓飾諸子始貧乏時治牆得積錢僮婢奔告母曰士不勤而祿猶災其身况無妄而得我何取亟使閉坎景讓自右散騎常侍出為浙西觀察使母問行日景讓率然對有日鄭曰如是吾方有事未及行蓋怒其不嘗告也且曰巳貴何庸毋行景讓重請罪乃赦故雖老猶加箠敕已起欣欣如初嘗怒牙將杖殺之軍且謀變母欲息衆歡召景讓廷責曰爾鎮撫方面而輕用刑一夫不寧豈特上負天子亦使百歲母銜羞泉下何面目見先大夫乎將鞭其背吏與將再拜請不許皆泣謝乃罷一軍遂定後拜西川節度使以病丐致仕或諫公廉潔亡素儲不為諸子謀耶景讓笑曰兒曹詎餓死乎書聞輒還東都以太子少保分司卒年七十二景讓清素寡欲門無雜賔李琢罷浙西以同里訪之避不見及去命斸其騙石焉元和後大臣有德望者以居里顯景讓宅東都樂和里世稱清德者號樂和李公云論曰崔玄暐母盧李景讓母鄭咸能戒敕其子保初終之節是則二子之清皆其母之烈也牛僧孺牛僧孺字思黯隋僕射竒章公𢎞之裔元和初以賢良方正對䇿第一歷位御史中丞按治不法內外整肅宿州刺史李直臣坐賕當死賂宦侍為助具獄上帝曰直臣有才朕欲貸而用之僧孺曰彼不才者持祿取容耳天子制法所以束縳有才者祿山朱泚以才過人故亂天下帝異其言乃止賜金紫服以戶部侍郎同中書門下平章事始韓𢎞入朝其子公武用財賄賂權貴杜塞言者俄而𢎞公武卒孫弱不能事帝遣使者至其家悉收資簿校計出入所以餉遺朝臣者皆在至僧孺獨注其左曰某月日送錢千萬不納帝善之謂左右曰吾不謬知人由是遂以相歷事四朝卒年六十九諡曰文簡論曰僧孺與李宗閔植黨排擊所憎權震天下起搢紳之祻四十餘年史官目之盜儒顧何足道哉然始能却韓公武餉錢致位宰相今取而附之廉吏使夫人有以見貪墨之事如僧孺輩猶知恥而不為是不可為也盧鈞盧鈞字子和系出范陽舉進士纍官監察御史爭宋申錫獄知名後擢嶺南節度使海道商舶始至異時帥府爭先賤售其珍鈞一不取時稱廉潔歷位將相所居官必有績大抵根仁恕至誠而施於事玩服不為鮮明其沒也家無贏財以太保致仕卒年八十七贈太傅諡曰元論曰宋申錫承帝旨鉏宦官不幸謀泄反陷於獄鈞乃能雪其寃然則鈞之大節乃東漢李固楊震李膺陳蕃之流歟有力於清議多矣廉吏傳卷下
